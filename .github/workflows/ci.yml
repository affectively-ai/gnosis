name: Gnosis CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Generate formal and complexity reports
        run: |
          set -euo pipefail
          mkdir -p reports

          for gg_file in betti.gg transformer.gg ai_hello.gg example.gg; do
            base_name="${gg_file%.gg}"
            node ./bin/gnosis.js lint "${gg_file}" --json > "reports/${base_name}.gg.json"
            node ./bin/gnosis.js lint "${gg_file}" --sarif > "reports/${base_name}.gg.sarif"
          done

          node ./bin/gnosis.js analyze src --json > reports/typescript.json
          node ./bin/gnosis.js analyze src --sarif > reports/typescript.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports

      - name: Upload JSON and SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnosis-analysis-reports
          path: reports/
